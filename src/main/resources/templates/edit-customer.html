<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Customer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .back-link { margin-bottom: 20px; }
        a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        a:hover { text-decoration: underline; }
        h1 { color: #667eea; margin-bottom: 30px; text-align: center; }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .save-btn {
            background-color: #667eea;
            color: white;
        }
        .save-btn:hover { background-color: #764ba2; }
        .cancel-btn {
            background-color: #ddd;
            color: #333;
        }
        .cancel-btn:hover { background-color: #ccc; }
    </style>
</head>
<body>
<div class="container">
    <div class="back-link">
        <a href="/">← Back to Customers</a>
    </div>

    <h1>✏️ Edit Customer</h1>

    <form method="post" th:action="@{/customer/{id}/update(id=${customer.id})}">
        <label>Full Name:</label>
        <input type="text" name="name" th:value="${customer.name}" required>

        <label>Address:</label>
        <input type="text" name="address" th:value="${customer.address}" required>

        <label>City:</label>
        <input type="text" name="city" th:value="${customer.city}" required>

        <div class="button-group">
            <button type="submit" class="save-btn">💾 Save Changes</button>
            <button type="button" class="cancel-btn" onclick="window.history.back()">❌ Cancel</button>
        </div>
    </form>
</div>
</body>
</html>
